name: Dev CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '*.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'mosquitto.conf'
      - '.github/workflows/dev-ci-cd.yml'
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: baro-dev-baro-edge
  EC2_NAME_TAG: baro-dev-mosquitto

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Syntax check
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  deploy:
    name: Build & Deploy
    needs: lint
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

      - name: Update baro-edge on EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=$EC2_NAME_TAG" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "EC2 not running yet — image pushed to ECR, will be pulled on next boot"
            exit 0
          fi

          echo "Updating EC2 instance: $INSTANCE_ID"

          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          SECRET_NAME="baro-dev/mosquitto/credentials"

          PARAMS=$(jq -n \
            --arg region "$AWS_REGION" \
            --arg registry "$ECR_REGISTRY" \
            --arg image "$IMAGE" \
            --arg secret "$SECRET_NAME" \
            '{commands: [
              "MQTT_SECRET=$(aws secretsmanager get-secret-value --secret-id \($secret) --region \($region) --query SecretString --output text)",
              "MQTT_USER=$(echo \"$MQTT_SECRET\" | python3 -c \"import sys,json; print(json.load(sys.stdin)[\\\"username\\\"])\")",
              "MQTT_PASS=$(echo \"$MQTT_SECRET\" | python3 -c \"import sys,json; print(json.load(sys.stdin)[\\\"password\\\"])\")",
              "aws ecr get-login-password --region \($region) | docker login --username AWS --password-stdin \($registry)",
              "docker pull \($image)",
              "docker stop baro-edge || true",
              "docker rm baro-edge || true",
              "docker run -d --name baro-edge --network baro-edge-net --restart unless-stopped -e MQTT_BROKER_HOST=mosquitto -e MQTT_BROKER_PORT=1883 -e MQTT_USERNAME=\"$MQTT_USER\" -e MQTT_PASSWORD=\"$MQTT_PASS\" \($image)"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' \
            --output text)

          echo "Status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' \
              --output text
            exit 1
          fi
